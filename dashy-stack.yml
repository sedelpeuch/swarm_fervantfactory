version: '3.8'

services:
  dashy:
    image: lissy93/dashy:latest
    volumes:
      - dashy_data:/app/public/data
      - ./conf.yml:/app/user-data/conf.yml
    ports:
      - "1313:8080"
    environment:
      - CONF_HASH=697bcd0f2de0c863a4da1a790f032f3d83721a8c65da459877a52aabf1831f42
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 360s
        order: start-first
        failure_action: rollback
        monitor: 120s  # Surveille pendant 2 minutes après le déploiement
      rollback_config:
        parallelism: 1
        delay: 360s
        order: start-first
        failure_action: pause
    networks:
      - proxy

volumes:
  dashy_data:

networks:
  proxy:
    external: true
